spring.application.name=book-lovers-project
# Server
server.port=8181

spring.docker.compose.enabled=false

# H2 (default) \u2014 development
spring.datasource.url=jdbc:h2:mem:bookdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console (dev)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Ensure data.sql is executed and runs after JPA schema creation
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# If you prefer MySQL, comment H2 above and use:
# spring.datasource.url=jdbc:mysql://localhost:3306/booklovers?useSSL=false&serverTimezone=UTC
# spring.datasource.username=root 
# spring.datasource.password=yourpassword
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JWT
jwt.secret=verysecretkeychangemeplease0123456789
jwt.expiration=86400000  
# 1 day in ms


# Swagger (springdoc)
#springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
#------
management.endpoints.web.exposure.include=health,info,mappings
management.endpoint.health.show-details=always